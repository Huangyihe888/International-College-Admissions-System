# =============================================================================
# Prometheus configuration for WYU 招生 RAG 问答系统
# -----------------------------------------------------------------------------
# - 后端 /api/v1/metrics 由 PromService 暴露 (prom-client, NestJS)
# - 基础设施 exporter 通过 host.docker.internal(开发机) 或 服务名(同网络) 抓取
# - 告警规则挂载在 /etc/prometheus/rules/*.yml
# - Alertmanager 占位 alertmanager:9093
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: wyu-rag
    env: dev
    region: local

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # ---------------------------------------------------------------------
  # Prometheus 自监控
  # ---------------------------------------------------------------------
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
        labels:
          component: prometheus

  # ---------------------------------------------------------------------
  # 后端 NestJS 应用:PromService 暴露 /api/v1/metrics
  # 开发机走 host.docker.internal;生产替换为 backend:3000 或 service DNS。
  # ---------------------------------------------------------------------
  - job_name: backend
    metrics_path: /api/v1/metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - host.docker.internal:3000
        labels:
          component: nestjs
          service: wyu-backend
          tier: app
      # 容器内同网络可解开下一行注释:
      # - targets:
      #     - backend:3000
      #   labels:
      #     component: nestjs
      #     service: wyu-backend
      #     tier: app

  # ---------------------------------------------------------------------
  # 后端主机资源:node-exporter(标准端口 9100)
  # ---------------------------------------------------------------------
  - job_name: node-exporter
    static_configs:
      - targets:
          - host.docker.internal:9100
        labels:
          component: host
          role: backend-host

  # ---------------------------------------------------------------------
  # Nginx 反向代理(若有 nginx-exporter 插件)
  # ---------------------------------------------------------------------
  - job_name: nginx-exporter
    static_configs:
      - targets:
          - nginx-exporter:9113
        labels:
          component: nginx
          tier: edge

  # ---------------------------------------------------------------------
  # PostgreSQL + pgvector:postgres_exporter(9187)
  # ---------------------------------------------------------------------
  - job_name: postgres-exporter
    static_configs:
      - targets:
          - postgres-exporter:9187
        labels:
          component: postgres
          service: wyu-postgres

  # ---------------------------------------------------------------------
  # Redis:redis_exporter(9121)
  # ---------------------------------------------------------------------
  - job_name: redis-exporter
    static_configs:
      - targets:
          - redis-exporter:9121
        labels:
          component: redis
          service: wyu-redis

  # ---------------------------------------------------------------------
  # MinIO:集群指标(需开启 MINIO_PROMETHEUS_AUTH_TYPE=public 或 bearer token)
  # ---------------------------------------------------------------------
  - job_name: minio-cluster
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets:
          - minio:9000
        labels:
          component: minio
          service: wyu-minio
  - job_name: minio-bucket
    metrics_path: /minio/v2/metrics/bucket
    static_configs:
      - targets:
          - minio:9000
        labels:
          component: minio
          service: wyu-minio
          scope: bucket
  - job_name: minio-node
    metrics_path: /minio/v2/metrics/node
    static_configs:
      - targets:
          - minio:9000
        labels:
          component: minio
          service: wyu-minio
          scope: node

  # ---------------------------------------------------------------------
  # Blackbox exporter(可选):用于 HTTP/TCP/ICMP 主动探活
  # - 与 alerts.yml 中 HealthCheckFailing 配合
  # - 若未部署,直接删除整个 job,告警规则不会触发
  # ---------------------------------------------------------------------
  - job_name: blackbox
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://host.docker.internal:3000/api/v1/health/live
          - http://host.docker.internal:3000/api/v1/health/ready
        labels:
          component: blackbox
          health_target: backend
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
