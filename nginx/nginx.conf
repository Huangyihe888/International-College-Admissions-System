# =========================================================
# Wyu RAG — Nginx reverse proxy
# - HTTP 80: 微信(MicroMessenger)直接服务, 其他浏览器 301→HTTPS
# - HTTPS 443: /api/* -> backend:3000, / -> frontend:80
# - SSE friendly: buffering off, long read timeout
# - Rate limiting: admin login 5r/m, general API 30r/s
# =========================================================

limit_req_zone $binary_remote_addr zone=admin_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# 因为没有域名，暂时放行所有浏览器的 HTTP 访问，避免 HTTPS 证书报错
map $http_user_agent $allow_http {
    default             1;
}

# -----------------------------------------------------------
# HTTP (port 80) — 直接服务
# -----------------------------------------------------------
server {
    listen 80;
    server_name _;

    # 因为没有域名，暂时关闭强制 HTTPS 跳转
    # if ($allow_http = 0) {
    #     return 301 https://$host$request_uri;
    # }

    client_max_body_size 50M;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /api/v1/auth/login {
        limit_req zone=admin_login burst=3 nodelay;
        limit_req_status 429;
        proxy_buffering off;
        proxy_pass http://backend:3000;
    }

    location /api/ {
        limit_req zone=api_general burst=50 nodelay;
        limit_req_status 429;
        proxy_buffering     off;
        proxy_cache         off;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 60s;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        add_header X-Accel-Buffering no always;
        proxy_pass http://backend:3000;
    }

    location ^~ /.well-known/acme-challenge/ {
        root /etc/nginx/acme-challenge;
    }

    location / {
        proxy_pass http://frontend:80;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}

# -----------------------------------------------------------
# HTTPS (port 443) — 浏览器安全访问
# -----------------------------------------------------------
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/wyu.crt;
    ssl_certificate_key /etc/nginx/ssl/wyu.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 50M;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;

    location = /api/v1/auth/login {
        limit_req zone=admin_login burst=3 nodelay;
        limit_req_status 429;
        proxy_buffering off;
        proxy_pass http://backend:3000;
    }

    location /api/ {
        limit_req zone=api_general burst=50 nodelay;
        limit_req_status 429;
        proxy_buffering     off;
        proxy_cache         off;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 60s;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        add_header X-Accel-Buffering no always;
        proxy_pass http://backend:3000;
    }

    location ^~ /.well-known/acme-challenge/ {
        root /etc/nginx/acme-challenge;
    }

    location / {
        proxy_pass http://frontend:80;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
